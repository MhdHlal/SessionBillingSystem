version: "3.8"

services:
  database:
    image: postgres:16-alpine
    container_name: session_billing_postgres
    environment:
      POSTGRES_DB: session_billing_db
      POSTGRES_USER: postgres_admin
      POSTGRES_PASSWORD: SecureP@ss123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
